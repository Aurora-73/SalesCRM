<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>北狩：咸丰帝的抉择 - 历史沉浸式决策游戏</title>
    <meta name="description" content="基于史实的沉浸式历史决策游戏。穿越回1860年，成为咸丰皇帝，在第二次鸦片战争的烽火中做出你的选择。">
    <link rel="stylesheet" href="css/style.css">
    <!-- Phaser 3 游戏引擎 -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
</head>
<body>
    <!-- ============================================
         开始菜单
         ============================================ -->
    <div id="menu-screen">
        <div class="menu-title">北 狩</div>
        <div class="menu-subtitle">咸丰帝的抉择 · 1860</div>
        <div class="menu-context">
            公元1860年，咸丰十年。<br>
            八里桥之战惨败，英法联军逼近北京。<br>
            你，就是大清朝的咸丰皇帝。<br><br>
            去，还是留？<br>
            这一个抉择，将改变历史的轨迹。
        </div>
        <button class="menu-btn" id="start-btn">进入游戏</button>
        <div class="menu-note">
            WASD 或方向键移动 · 空格键交互 · M键地图 · H键史实记录<br>
            移动端支持虚拟摇杆操作
        </div>
    </div>

    <!-- ============================================
         游戏主容器
         ============================================ -->
    <div id="game-container">
        <!-- Phaser 画布将自动注入此处 -->

        <!-- 顶部信息栏 -->
        <div id="top-bar">
            <div id="scene-name">场景名称</div>
            <div id="scene-desc">场景描述</div>
            <div id="top-actions">
                <button class="btn-icon" id="btn-timeline" title="史料时间线 (L)">📜</button>
                <button class="btn-icon" id="btn-geo" title="天下大势 (G)">⚔</button>
                <button class="btn-icon" id="btn-map" title="地图 (M)">🗺</button>
                <button class="btn-icon" id="btn-history" title="史实记录 (H)">📋</button>
                <button class="btn-icon" id="btn-tts" title="旁白配音 (T)">🔊</button>
                <button class="btn-icon" id="btn-audio" title="音效开关 (X)">🎵</button>
            </div>
        </div>

        <!-- 顶部 HUD 国力数据面板 -->
        <div id="top-hud">
            <div class="hud-item">
                <div class="hud-label">国库</div>
                <div class="hud-value hud-danger" id="hud-finance">不足10万两</div>
            </div>
            <div class="hud-divider"></div>
            <div class="hud-item">
                <div class="hud-label">京师兵力</div>
                <div class="hud-value hud-warning" id="hud-troops">~8万</div>
            </div>
            <div class="hud-divider"></div>
            <div class="hud-item">
                <div class="hud-label">民心</div>
                <div class="hud-value hud-danger" id="hud-morale">崩溃</div>
            </div>
            <div class="hud-divider"></div>
            <div class="hud-item">
                <div class="hud-label">联军</div>
                <div class="hud-value hud-danger" id="hud-enemy">已入北京</div>
            </div>
            <div class="hud-divider"></div>
            <div class="hud-item">
                <div class="hud-label">太平天国</div>
                <div class="hud-value hud-purple" id="hud-taiping">控制苏南</div>
            </div>
            <div class="hud-divider"></div>
            <div class="hud-item">
                <div class="hud-label">日期</div>
                <div class="hud-value" id="hud-date">咸丰十年 · 九月</div>
            </div>
        </div>

        <!-- TTS 语音指示器 -->
        <div id="tts-indicator" class="tts-indicator">
            <div class="tts-wave"><span></span><span></span><span></span><span></span><span></span></div>
            <span>旁白配音中</span>
        </div>

        <!-- 氛围文字层 -->
        <div id="atmosphere-overlay" class="atmosphere-overlay"></div>

        <!-- 旁白面板 -->
        <div id="narrator-panel">
            <div class="narrator-label">— 历史之声 —</div>
            <div class="narrator-text"></div>
        </div>

        <!-- 交互提示 -->
        <div id="interaction-hint"></div>

        <!-- 对话面板 -->
        <div id="dialogue-panel">
            <div class="dialogue-header">
                <div class="dialogue-avatar"></div>
                <div class="dialogue-info">
                    <div class="dialogue-name"></div>
                    <div class="dialogue-title"></div>
                </div>
                <div class="dialogue-close" onclick="UIManager.hideDialogue()">✕</div>
            </div>
            <div class="dialogue-content"></div>
            <div class="dialogue-source" style="display:none"></div>
            <div class="dialogue-options"></div>
        </div>

        <!-- 决策面板 -->
        <div id="decision-panel">
            <div class="decision-container">
                <div class="decision-title"></div>
                <div class="decision-context"></div>
                <div class="decision-options"></div>
            </div>
        </div>

        <!-- 反馈面板 -->
        <div id="feedback-panel">
            <div class="feedback-title">抉择回响</div>
            <div class="feedback-text"></div>
        </div>

        <!-- 结局面板 -->
        <div id="ending-panel">
            <div class="ending-container">
                <div class="ending-title"></div>
                <div class="ending-subtitle"></div>
                <div class="ending-content"></div>
                <div class="ending-note"></div>
                <div class="ending-actions">
                    <button class="btn-primary" onclick="location.reload()">重新开始</button>
                </div>
            </div>
        </div>

        <!-- 小地图面板 -->
        <div id="minimap-panel">
            <div class="minimap-title">天下大势</div>
            <canvas class="minimap-canvas" width="200" height="150"></canvas>
            <div class="minimap-locations"></div>
        </div>

        <!-- 史实日志面板 -->
        <div id="history-log-panel"></div>

        <!-- 国力与国际局势面板 -->
        <div id="geopolitics-panel">
            <!-- 国力指标 -->
            <div class="geo-section-title">大清国力</div>
            <div class="power-grid" id="power-grid"></div>

            <!-- 国际势力 -->
            <div class="geo-section-title">列强环伺</div>
            <div class="threat-list" id="threat-list"></div>

            <!-- 战争形势 -->
            <div class="geo-section-title" id="war-timeline-title">北方战场</div>
            <div class="war-timeline" id="war-timeline"></div>
        </div>

        <!-- 史料时间线面板 -->
        <div id="timeline-panel">
            <div class="timeline-panel-title">咸丰末年 · 史料编年</div>
            <div class="timeline-list" id="timeline-list"></div>
        </div>

        <!-- 虚拟摇杆（移动端） -->
        <div id="virtual-joystick">
            <div class="joystick-base"></div>
            <div class="joystick-knob"></div>
        </div>

        <!-- 操作提示 -->
        <div id="controls-hint">
            WASD/方向键：移动<br>
            空格/E：交互<br>
            M：小地图<br>
            H：史实记录
        </div>
    </div>

    <!-- ============================================
         脚本加载
         ============================================ -->
    <script src="js/data/history.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/game.js"></script>

    <!-- 顶部按钮事件绑定 -->
    <script>
        document.getElementById('btn-map').addEventListener('click', function() {
            UIManager.hideGeopolitics();
            UIManager.hideHistoryLog();
            if (UIManager.minimapPanel.classList.contains('active')) {
                UIManager.hideMinimap();
            } else {
                const scene = game.scene.getScene('PlayScene');
                if (scene) {
                    UIManager.showMinimap(scene.sceneId, function(sceneId) {
                        scene.transitionToScene(sceneId);
                    });
                }
            }
        });

        document.getElementById('btn-history').addEventListener('click', function() {
            UIManager.hideMinimap();
            UIManager.hideGeopolitics();
            if (UIManager.historyLogPanel.classList.contains('active')) {
                UIManager.hideHistoryLog();
            } else {
                UIManager.showHistoryLog();
            }
        });

        document.getElementById('btn-geo').addEventListener('click', function() {
            UIManager.hideMinimap();
            UIManager.hideHistoryLog();
            UIManager.showGeopolitics();
        });

        document.getElementById('btn-tts').addEventListener('click', function() {
            var enabled = TTSNarrator.toggle();
            this.textContent = enabled ? '🔊' : '🔇';
        });

        document.getElementById('btn-timeline').addEventListener('click', function() {
            UIManager.hideMinimap();
            UIManager.hideGeopolitics();
            UIManager.hideHistoryLog();
            UIManager.showTimeline();
        });

        document.getElementById('btn-audio').addEventListener('click', function() {
            var enabled = AmbientAudio.toggle();
            this.textContent = enabled ? '🎵' : '🔇';
            this.classList.toggle('muted', !enabled);
        });
    </script>
</body>
</html>
